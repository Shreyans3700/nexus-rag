version: '3.8'

# Full stack: FastAPI chatbot + Milvus (etcd + MinIO + Milvus Standalone).
# PostgreSQL runs on the host machine — reachable via host.docker.internal.
#
# Usage:
#   docker compose up -d --build       # first run / after code changes
#   docker compose up -d               # subsequent runs (no rebuild)
#   docker compose down                # stop but keep volumes
#   docker compose down -v             # stop and wipe ALL data (fresh start)
#
# The FastAPI app is available at: http://localhost:8000
# The Streamlit frontend is run separately: streamlit run frontend.py

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >-
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - milvus-net

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - milvus-net

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.27
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      MINIO_REGION: us-east-1
      COMMON_SECURITY_AUTHORIZATIONENABLED: "true"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - milvus-net

  chatbot:
    container_name: chatbot-api
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override MILVUS_HOST — inside Docker, reach Milvus by its container name
      MILVUS_HOST: milvus-standalone
    ports:
      - "8000:8000"
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - milvus-net
    # host.docker.internal lets the container reach Postgres on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  milvus-net:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
